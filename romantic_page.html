<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Surprise</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        #surprise-text {
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s ease;
            margin-bottom: 20px;
        }

        #surprise-text.show {
            opacity: 1;
            transform: scale(1);
        }

        #big-text {
            font-size: 3rem;
            color: #ff1493;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.3);
        }

        #small-text {
            font-size: 1.5rem;
            color: #ffb6c1;
            margin: 10px 0 0 0;
        }

        #click-btn {
            background: linear-gradient(45deg, #ff69b4, #ffb6c1);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 50px;
        }

        #click-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.5);
        }

        #footer {
            position: fixed;
            bottom: 20px;
            font-size: 1rem;
            color: #ff69b4;
            text-shadow: 1px 1px 2px rgba(255, 105, 180, 0.5);
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            color: #ff69b4;
            animation: float 3s ease-out forwards;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: scale(0) translateY(0px); opacity: 1; }
            50% { transform: scale(1) translateY(-50px); opacity: 1; }
            100% { transform: scale(0) translateY(-100px); opacity: 0; }
        }

        @media (max-width: 768px) {
            #big-text {
                font-size: 2.5rem;
            }
            #small-text {
                font-size: 1.2rem;
            }
            #click-btn {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button id="click-btn">Click me 💌</button>
    <div id="surprise-text">
        <h1 id="big-text">BAMOOT FEKYYY 💕</h1>
        <p id="small-text">5ody bosa 😘</p>
    </div>
    <div id="footer">Made for my Joj 💖</div>

    <script>
        const clickBtn = document.getElementById('click-btn');
        const surpriseText = document.getElementById('surprise-text');
        const body = document.body;

        clickBtn.addEventListener('click', () => {
            surpriseText.classList.add('show');
            clickBtn.style.display = 'none'; // Hide button after click

            // Add floating hearts
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = '❤️';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.top = Math.random() * 100 + '%';
                    body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 200);
            }
        });
    </script>
</body>
</html>
